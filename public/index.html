<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Restream Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Tennis Restream Manager</h1>
    <div class="header-right">
      <div id="sys-stats" class="sys-stats">
        <span class="sys-item">CPU <span id="cpu-val">—</span></span>
        <span class="sys-item">MEM <span id="mem-val">—</span></span>
        <span class="sys-item" id="gpu-item" style="display:none">GPU <span id="gpu-val">—</span></span>
        <span class="sys-item" id="gmem-item" style="display:none">GMEM <span id="gmem-val">—</span></span>
      </div>
      <div id="score-status" class="score-status">Connecting...</div>
    </div>
  </header>

  <div class="settings-bar">
    <div class="field-group settings-field">
      <label>Scorebug URL <span class="settings-hint">— use {court} for court number</span></label>
      <input type="text" id="scorebug-url" spellcheck="false" autocomplete="off"
        placeholder="https://example.com/scorebug.php?court={court}">
    </div>
    <div class="field-group settings-field">
      <label>Team Bug URL <span class="settings-hint">— use {court} for court number (optional)</span></label>
      <input type="text" id="teambug-url" spellcheck="false" autocomplete="off"
        placeholder="https://example.com/teambug.php?court={court}">
    </div>
    <div class="field-group settings-field settings-field--narrow">
      <label>Video Bitrate (kbps)</label>
      <input type="number" id="video-bitrate" min="1000" max="50000" step="500" placeholder="8000" autocomplete="off">
    </div>
    <div class="field-group settings-field--action">
      <button id="reset-defaults">Reset All to Defaults</button>
    </div>
  </div>

  <main class="grid" id="stream-grid">
    <!-- 6 stream panels injected by app.js -->
  </main>

  <script src="app.js"></script>
</body>
</html>
